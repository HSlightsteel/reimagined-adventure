services:
  tiktok-recorder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tiktok-live-recorder
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      # Inject execution parameters
      - TIKTOK_USER=${TIKTOK_USER}
      - TIKTOK_MODE=${TIKTOK_MODE:-automatic}
      - INTERVAL_MINUTES=${INTERVAL_MINUTES:-1}
      - MAX_PARALLEL_RECORDINGS=${MAX_PARALLEL_RECORDINGS:-3}
      - API_PORT=${API_PORT:-3000}
      # Google Drive config (OAuth2 — files owned by your personal account)
      - GDRIVE_CLIENT_ID=${GDRIVE_CLIENT_ID}
      - GDRIVE_CLIENT_SECRET=${GDRIVE_CLIENT_SECRET}
      - GDRIVE_REFRESH_TOKEN=${GDRIVE_REFRESH_TOKEN}
      - GDRIVE_FOLDER_ID=${GDRIVE_FOLDER_ID}
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    volumes:
      # Persists thumbnails (.jpg) and recordings.json DB only.
      # MP4 files are temporary — auto-deleted after successful upload to Drive + Telegram.
      - ./recordings:/app/recordings
